<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egg Cooker Wizard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fdf6e3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    max-width: 420px;
    width: 100%;
    padding: 40px 32px;
    text-align: center;
    position: relative;
  }
  .emoji-title { font-size: 48px; margin-bottom: 8px; }
  h1 { font-size: 22px; color: #333; margin-bottom: 28px; font-weight: 600; }
  .step-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .question { font-size: 17px; color: #444; margin-bottom: 32px; }

  /* Lang switcher */
  .lang-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #f5f0e5;
    border: none;
    border-radius: 10px;
    padding: 6px 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    font-weight: 600;
    color: #999;
  }
  .lang-btn:hover { background: #ebe4d4; color: #666; }
  .lang-menu {
    position: absolute;
    top: 48px;
    right: 16px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 6px;
    z-index: 10;
    display: none;
  }
  .lang-menu.open { display: block; }
  .lang-option {
    display: block;
    width: 100%;
    padding: 8px 12px;
    border: none;
    background: none;
    font-size: 14px;
    color: #555;
    display: block;
    cursor: pointer;
    border-radius: 8px;
    text-align: left;
    white-space: nowrap;
  }
  .lang-option:hover { background: #f5f0e5; }
  .lang-option.active { color: #f0a500; font-weight: 600; }

  /* Egg count selector */
  .egg-rows {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 8px;
  }
  .egg-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .egg-btn {
    width: 64px; height: 64px;
    border-radius: 16px;
    border: 2px solid #e8e0d0;
    background: #fffcf5;
    font-size: 22px;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
  }
  .egg-btn:hover { border-color: #f0a500; color: #f0a500; }
  .egg-btn.active {
    border-color: #f0a500;
    background: #f0a500;
    color: #fff;
    transform: scale(1.05);
  }

  /* Type selector */
  .type-grid { display: flex; flex-direction: column; gap: 10px; }
  .type-btn {
    padding: 16px 20px;
    border-radius: 14px;
    border: 2px solid #e8e0d0;
    background: #fffcf5;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .type-btn:hover { border-color: #f0a500; }
  .type-btn.active { border-color: #f0a500; background: #fff8e1; }
  .type-btn .label { font-weight: 600; color: #333; }
  .type-btn .desc { font-size: 13px; color: #999; margin-top: 2px; }

  /* Result */
  .result-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f0a500, #ff8c00);
    margin: 0 auto 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .result-circle .amount { font-size: 42px; font-weight: 700; }
  .result-circle .unit { font-size: 15px; opacity: 0.9; }
  .result-info { font-size: 15px; color: #777; line-height: 1.6; margin-bottom: 24px; }
  .result-info strong { color: #444; }

  /* Buttons */
  .nav { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back { background: #f0ebe0; color: #888; }
  .btn-back:hover { background: #e5ddd0; }
  .btn-next { background: #f0a500; color: #fff; }
  .btn-next:hover { background: #e09500; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hidden { display: none; }

  /* Progress */
  .progress {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e8e0d0;
    transition: all 0.3s;
  }
  .dot.active { background: #f0a500; width: 24px; border-radius: 4px; }
  .dot.done { background: #f0a500; }
</style>
</head>
<body>

<div class="card">
  <button class="lang-btn" id="langBtn" onclick="toggleLangMenu()">🌐</button>
  <div class="lang-menu" id="langMenu"></div>

  <div class="emoji-title">🥚</div>
  <h1 id="title"></h1>
  <div class="progress">
    <div class="dot" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
  </div>

  <!-- Step 1: Count -->
  <div id="step0">
    <div class="step-label" id="stepLabel1"></div>
    <div class="question" id="q1"></div>
    <div class="egg-rows" id="eggGrid">
      <div class="egg-row" id="eggRow1"></div>
      <div class="egg-row" id="eggRow2"></div>
    </div>
    <div class="nav">
      <button class="btn btn-next" id="nextBtn0" disabled onclick="goTo(1)"></button>
    </div>
  </div>

  <!-- Step 2: Type -->
  <div id="step1" class="hidden">
    <div class="step-label" id="stepLabel2"></div>
    <div class="question" id="q2"></div>
    <div class="type-grid" id="typeGrid">
      <button class="type-btn" data-type="soft" onclick="selectType(this)">
        <span class="label" id="typeSoftLabel"></span><br>
        <span class="desc" id="typeSoftDesc"></span>
      </button>
      <button class="type-btn" data-type="medium" onclick="selectType(this)">
        <span class="label" id="typeMediumLabel"></span><br>
        <span class="desc" id="typeMediumDesc"></span>
      </button>
      <button class="type-btn" data-type="hard" onclick="selectType(this)">
        <span class="label" id="typeHardLabel"></span><br>
        <span class="desc" id="typeHardDesc"></span>
      </button>
    </div>
    <div class="nav">
      <button class="btn btn-back" id="backBtn1" onclick="goTo(0)"></button>
      <button class="btn btn-next" id="nextBtn1" disabled onclick="goTo(2)"></button>
    </div>
  </div>

  <!-- Step 3: Result -->
  <div id="step2" class="hidden">
    <div class="step-label" id="stepLabel3"></div>
    <div class="question" id="q3"></div>
    <div class="result-circle">
      <div class="amount" id="resultMl">—</div>
      <div class="unit" id="resultUnit"></div>
    </div>
    <div class="result-info" id="resultInfo"></div>
    <div class="nav">
      <button class="btn btn-back" id="backBtn2" onclick="goTo(1)"></button>
      <button class="btn btn-next" id="resetBtn" onclick="reset()"></button>
    </div>
  </div>
</div>

<script>
const data = {
  soft:   [60, 60, 55, 55, 45, 45, 40],
  medium: [80, 75, 70, 65, 55, 50, 45],
  hard:   [110,110,100,90, 85, 80, 70]
};

const i18n = {
  ru: {
    title: 'Помощник яйцеварки',
    step: (n) => `Шаг ${n} из 3`,
    done: 'Готово!',
    q1: 'Сколько яиц варим?',
    q2: 'Как сварить?',
    q3: 'Налейте воды в яйцеварку:',
    next: 'Далее',
    back: 'Назад',
    restart: 'Сначала',
    unit: 'мл воды',
    soft: 'Всмятку', softDesc: 'Жидкий желток, ~3 мин',
    medium: 'Полутвёрдое', mediumDesc: 'Кремовый желток, ~6 мин',
    hard: 'Вкрутую', hardDesc: 'Твёрдый желток, ~10 мин',
    egg: (n) => n === 1 ? 'яйцо' : (n >= 2 && n <= 4 ? 'яйца' : 'яиц'),
    cc: 'ru'
  },
  en: {
    title: 'Egg Cooker Helper',
    step: (n) => `Step ${n} of 3`,
    done: 'Done!',
    q1: 'How many eggs?',
    q2: 'How to cook?',
    q3: 'Pour water into the egg cooker:',
    next: 'Next',
    back: 'Back',
    restart: 'Start over',
    unit: 'ml water',
    soft: 'Soft-boiled', softDesc: 'Runny yolk, ~3 min',
    medium: 'Medium', mediumDesc: 'Creamy yolk, ~6 min',
    hard: 'Hard-boiled', hardDesc: 'Firm yolk, ~10 min',
    egg: (n) => n === 1 ? 'egg' : 'eggs',
    cc: 'gb'
  },
  de: {
    title: 'Eierkocher-Helfer',
    step: (n) => `Schritt ${n} von 3`,
    done: 'Fertig!',
    q1: 'Wie viele Eier?',
    q2: 'Wie kochen?',
    q3: 'Wasser in den Eierkocher gießen:',
    next: 'Weiter',
    back: 'Zurück',
    restart: 'Neu starten',
    unit: 'ml Wasser',
    soft: 'Weich', softDesc: 'Flüssiges Eigelb, ~3 Min',
    medium: 'Mittel', mediumDesc: 'Cremiges Eigelb, ~6 Min',
    hard: 'Hart', hardDesc: 'Festes Eigelb, ~10 Min',
    egg: (n) => n === 1 ? 'Ei' : 'Eier',
    cc: 'de'
  },
  fr: {
    title: 'Assistant cuiseur à œufs',
    step: (n) => `Étape ${n} sur 3`,
    done: 'Terminé !',
    q1: 'Combien d\'œufs ?',
    q2: 'Quelle cuisson ?',
    q3: 'Versez l\'eau dans le cuiseur :',
    next: 'Suivant',
    back: 'Retour',
    restart: 'Recommencer',
    unit: 'ml d\'eau',
    soft: 'À la coque', softDesc: 'Jaune liquide, ~3 min',
    medium: 'Mollet', mediumDesc: 'Jaune crémeux, ~6 min',
    hard: 'Dur', hardDesc: 'Jaune ferme, ~10 min',
    egg: (n) => n === 1 ? 'œuf' : 'œufs',
    cc: 'fr'
  },
  es: {
    title: 'Asistente cocedor de huevos',
    step: (n) => `Paso ${n} de 3`,
    done: '¡Listo!',
    q1: '¿Cuántos huevos?',
    q2: '¿Cómo cocinar?',
    q3: 'Vierta agua en el cocedor:',
    next: 'Siguiente',
    back: 'Atrás',
    restart: 'Reiniciar',
    unit: 'ml de agua',
    soft: 'Pasado por agua', softDesc: 'Yema líquida, ~3 min',
    medium: 'Medio', mediumDesc: 'Yema cremosa, ~6 min',
    hard: 'Duro', hardDesc: 'Yema firme, ~10 min',
    egg: (n) => n === 1 ? 'huevo' : 'huevos',
    cc: 'es'
  },
  zh: {
    title: '煮蛋器助手',
    step: (n) => `第 ${n} 步，共 3 步`,
    done: '完成！',
    q1: '煮几个蛋？',
    q2: '怎么煮？',
    q3: '请向煮蛋器中加水：',
    next: '下一步',
    back: '返回',
    restart: '重新开始',
    unit: '毫升水',
    soft: '溏心蛋', softDesc: '流心蛋黄，约3分钟',
    medium: '半熟蛋', mediumDesc: '软嫩蛋黄，约6分钟',
    hard: '全熟蛋', hardDesc: '全熟蛋黄，约10分钟',
    egg: () => '个蛋',
    cc: 'cn'
  },
  ja: {
    title: 'エッグクッカー アシスタント',
    step: (n) => `ステップ ${n} / 3`,
    done: '完了！',
    q1: '卵の数は？',
    q2: 'ゆで加減は？',
    q3: 'エッグクッカーに水を入れてください：',
    next: '次へ',
    back: '戻る',
    restart: '最初から',
    unit: 'ml の水',
    soft: '半熟', softDesc: 'とろとろ黄身、約3分',
    medium: '中間', mediumDesc: 'クリーミーな黄身、約6分',
    hard: '固ゆで', hardDesc: 'しっかり黄身、約10分',
    egg: () => '個',
    cc: 'jp'
  }
};

const langs = Object.keys(i18n);
let currentLang = 'ru';
let count = 0, type = '';

// Detect browser language
function detectLang() {
  const nav = (navigator.language || '').slice(0, 2).toLowerCase();
  return langs.includes(nav) ? nav : 'en';
}

// Build lang menu
const langMenu = document.getElementById('langMenu');
langs.forEach(code => {
  const btn = document.createElement('button');
  btn.className = 'lang-option';
  btn.dataset.lang = code;
  btn.textContent = code.toUpperCase();
  btn.onclick = (e) => { e.stopPropagation(); setLang(code); toggleLangMenu(); };
  langMenu.appendChild(btn);
});

function toggleLangMenu() {
  langMenu.classList.toggle('open');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('#langBtn') && !e.target.closest('#langMenu'))
    langMenu.classList.remove('open');
});

function setLang(code) {
  currentLang = code;
  const t = i18n[code];
  document.getElementById('title').textContent = t.title;
  document.getElementById('stepLabel1').textContent = t.step(1);
  document.getElementById('q1').textContent = t.q1;
  document.getElementById('nextBtn0').textContent = t.next;
  document.getElementById('stepLabel2').textContent = t.step(2);
  document.getElementById('q2').textContent = t.q2;
  document.getElementById('backBtn1').textContent = t.back;
  document.getElementById('nextBtn1').textContent = t.next;
  document.getElementById('typeSoftLabel').textContent = t.soft;
  document.getElementById('typeSoftDesc').textContent = t.softDesc;
  document.getElementById('typeMediumLabel').textContent = t.medium;
  document.getElementById('typeMediumDesc').textContent = t.mediumDesc;
  document.getElementById('typeHardLabel').textContent = t.hard;
  document.getElementById('typeHardDesc').textContent = t.hardDesc;
  document.getElementById('stepLabel3').textContent = t.done;
  document.getElementById('q3').textContent = t.q3;
  document.getElementById('resultUnit').textContent = t.unit;
  document.getElementById('backBtn2').textContent = t.back;
  document.getElementById('resetBtn').textContent = t.restart;
  document.getElementById('langBtn').textContent = code.toUpperCase();
  langMenu.querySelectorAll('.lang-option').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === code);
  });
  if (count && type) showResult();
}

// Build egg buttons
const grid = document.getElementById('eggGrid');
const row1 = document.getElementById('eggRow1');
const row2 = document.getElementById('eggRow2');
for (let i = 1; i <= 7; i++) {
  const b = document.createElement('button');
  b.className = 'egg-btn';
  b.textContent = i;
  b.onclick = () => {
    count = i;
    grid.querySelectorAll('.egg-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('nextBtn0').disabled = false;
  };
  (i <= 4 ? row1 : row2).appendChild(b);
}

function selectType(btn) {
  type = btn.dataset.type;
  document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('nextBtn1').disabled = false;
}

function goTo(step) {
  for (let i = 0; i < 3; i++) {
    document.getElementById('step' + i).classList.toggle('hidden', i !== step);
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('active', i === step);
    dot.classList.toggle('done', i < step);
  }
  if (step === 2) showResult();
}

function showResult() {
  const t = i18n[currentLang];
  const ml = data[type][count - 1];
  document.getElementById('resultMl').textContent = ml;
  document.getElementById('resultInfo').innerHTML =
    `<strong>${count}</strong> ${t.egg(count)} — <strong>${t[type]}</strong>`;
}

function reset() {
  count = 0; type = '';
  grid.querySelectorAll('.egg-btn').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('nextBtn0').disabled = true;
  document.getElementById('nextBtn1').disabled = true;
  goTo(0);
}

setLang(detectLang());
goTo(0);
</script>
</body>
</html>
