<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Яйцеварка — Помощник</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fdf6e3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    max-width: 420px;
    width: 100%;
    padding: 40px 32px;
    text-align: center;
  }
  .emoji-title { font-size: 48px; margin-bottom: 8px; }
  h1 { font-size: 22px; color: #333; margin-bottom: 28px; font-weight: 600; }
  .step-label {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #999;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .question { font-size: 17px; color: #444; margin-bottom: 20px; }

  /* Egg count selector */
  .egg-grid {
    display: flex;
    display: grid;
    grid-template-columns: repeat(4, 64px);
    gap: 10px;
    justify-content: center;
    margin-bottom: 8px;
  }
  .egg-btn {
    width: 64px; height: 64px;
    border-radius: 16px;
    border: 2px solid #e8e0d0;
    background: #fffcf5;
    font-size: 22px;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
  }
  .egg-btn:hover { border-color: #f0a500; color: #f0a500; }
  .egg-btn.active {
    border-color: #f0a500;
    background: #f0a500;
    color: #fff;
    transform: scale(1.05);
  }

  /* Type selector */
  .type-grid { display: flex; flex-direction: column; gap: 10px; }
  .type-btn {
    padding: 14px 20px;
    border-radius: 14px;
    border: 2px solid #e8e0d0;
    background: #fffcf5;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .type-btn:hover { border-color: #f0a500; }
  .type-btn.active { border-color: #f0a500; background: #fff8e1; }
  .type-btn .icon { font-size: 28px; }
  .type-btn .label { font-weight: 600; color: #333; }
  .type-btn .desc { font-size: 13px; color: #999; }

  /* Result */
  .result-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f0a500, #ff8c00);
    margin: 0 auto 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .result-circle .amount { font-size: 42px; font-weight: 700; }
  .result-circle .unit { font-size: 15px; opacity: 0.9; }
  .result-info { font-size: 15px; color: #777; line-height: 1.6; margin-bottom: 24px; }
  .result-info strong { color: #444; }

  /* Buttons */
  .nav { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back { background: #f0ebe0; color: #888; }
  .btn-back:hover { background: #e5ddd0; }
  .btn-next { background: #f0a500; color: #fff; }
  .btn-next:hover { background: #e09500; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .hidden { display: none; }

  /* Progress */
  .progress {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e8e0d0;
    transition: all 0.3s;
  }
  .dot.active { background: #f0a500; width: 24px; border-radius: 4px; }
  .dot.done { background: #f0a500; }
</style>
</head>
<body>

<div class="card">
  <div class="emoji-title">🥚</div>
  <h1>Помощник яйцеварки</h1>
  <div class="progress">
    <div class="dot" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
  </div>

  <!-- Step 1: Count -->
  <div id="step0">
    <div class="step-label">Шаг 1 из 3</div>
    <div class="question">Сколько яиц варим?</div>
    <div class="egg-grid" id="eggGrid"></div>
    <div class="nav">
      <button class="btn btn-next" id="nextBtn0" disabled onclick="goTo(1)">Далее</button>
    </div>
  </div>

  <!-- Step 2: Type -->
  <div id="step1" class="hidden">
    <div class="step-label">Шаг 2 из 3</div>
    <div class="question">Как сварить?</div>
    <div class="type-grid" id="typeGrid">
      <button class="type-btn" data-type="soft" onclick="selectType(this)">
        <span class="icon">💧</span>
        <span><span class="label">Всмятку</span><br><span class="desc">Жидкий желток, ~3 мин</span></span>
      </button>
      <button class="type-btn" data-type="medium" onclick="selectType(this)">
        <span class="icon">🍯</span>
        <span><span class="label">Полутвёрдое</span><br><span class="desc">Кремовый желток, ~6 мин</span></span>
      </button>
      <button class="type-btn" data-type="hard" onclick="selectType(this)">
        <span class="icon">🪨</span>
        <span><span class="label">Вкрутую</span><br><span class="desc">Твёрдый желток, ~10 мин</span></span>
      </button>
    </div>
    <div class="nav">
      <button class="btn btn-back" onclick="goTo(0)">Назад</button>
      <button class="btn btn-next" id="nextBtn1" disabled onclick="goTo(2)">Далее</button>
    </div>
  </div>

  <!-- Step 3: Result -->
  <div id="step2" class="hidden">
    <div class="step-label">Готово!</div>
    <div class="question">Налейте воды в яйцеварку:</div>
    <div class="result-circle">
      <div class="amount" id="resultMl">—</div>
      <div class="unit">мл воды</div>
    </div>
    <div class="result-info" id="resultInfo"></div>
    <div class="nav">
      <button class="btn btn-back" onclick="goTo(1)">Назад</button>
      <button class="btn btn-next" onclick="reset()">Сначала</button>
    </div>
  </div>
</div>

<script>
const data = {
  soft:   [60, 60, 55, 55, 45, 45, 40],
  medium: [80, 75, 70, 65, 55, 50, 45],
  hard:   [110,110,100,90, 85, 80, 70]
};
const typeNames = { soft: 'всмятку', medium: 'полутвёрдое', hard: 'вкрутую' };

let count = 0, type = '';

// Build egg buttons
const grid = document.getElementById('eggGrid');
for (let i = 1; i <= 7; i++) {
  const b = document.createElement('button');
  b.className = 'egg-btn';
  b.textContent = i;
  b.onclick = () => {
    count = i;
    grid.querySelectorAll('.egg-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('nextBtn0').disabled = false;
  };
  grid.appendChild(b);
}

function selectType(btn) {
  type = btn.dataset.type;
  document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('nextBtn1').disabled = false;
}

function goTo(step) {
  for (let i = 0; i < 3; i++) {
    document.getElementById('step' + i).classList.toggle('hidden', i !== step);
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('active', i === step);
    dot.classList.toggle('done', i < step);
  }
  if (step === 2) showResult();
}

function showResult() {
  const ml = data[type][count - 1];
  document.getElementById('resultMl').textContent = ml;
  document.getElementById('resultInfo').innerHTML =
    `<strong>${count}</strong> ${eggWord(count)} — <strong>${typeNames[type]}</strong>`;
}

function eggWord(n) {
  if (n === 1) return 'яйцо';
  if (n >= 2 && n <= 4) return 'яйца';
  return 'яиц';
}

function reset() {
  count = 0; type = '';
  grid.querySelectorAll('.egg-btn').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('nextBtn0').disabled = true;
  document.getElementById('nextBtn1').disabled = true;
  goTo(0);
}

goTo(0);
</script>
</body>
</html>
