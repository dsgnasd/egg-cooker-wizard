<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Egg Cooker Wizard</title>
<link rel="icon" type="image/svg+xml" href="icon.svg?v=3">
<link rel="apple-touch-icon" href="icon-192.png?v=3">
<link rel="manifest" href="manifest.json?v=3">
<meta name="theme-color" content="#FF6B00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #fff4e6 0%, #fde8d0 100%);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    padding: 16px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
    overflow-x: hidden;
  }

  .card {
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 12px 48px rgba(255, 107, 0, 0.08), 0 2px 8px rgba(0,0,0,0.04);
    max-width: 400px;
    width: 100%;
    padding: 36px 28px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .emoji-title {
    font-size: 52px;
    margin-bottom: 4px;
    animation: eggBounce 2s ease-in-out infinite;
  }
  @keyframes eggBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-size: 24px;
    color: #1a1a1a;
    margin-bottom: 24px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .step-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #bbb;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .question {
    font-size: 18px;
    color: #444;
    margin-bottom: 28px;
    font-weight: 500;
  }

  /* Lang switcher */
  .lang-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: rgba(0,0,0,0.04);
    border: none;
    border-radius: 10px;
    padding: 7px 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 12px;
    font-weight: 700;
    color: #aaa;
    letter-spacing: 0.5px;
    backdrop-filter: blur(8px);
  }
  .lang-btn:active { transform: scale(0.92); }
  .lang-menu {
    position: absolute;
    top: 50px;
    right: 14px;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(20px);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    padding: 6px;
    z-index: 10;
    display: none;
    animation: menuIn 0.2s ease-out;
  }
  @keyframes menuIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .lang-menu.open { display: block; }
  .lang-option {
    display: block;
    width: 100%;
    padding: 10px 16px;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 500;
    color: #555;
    cursor: pointer;
    border-radius: 10px;
    text-align: left;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .lang-option:active { background: #f0f0f0; }
  .lang-option.active { color: #FF6B00; font-weight: 700; }

  /* Steps transition */
  .step { animation: stepIn 0.35s ease-out; }
  @keyframes stepIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hidden { display: none; }

  /* Egg count selector */
  .egg-rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 4px;
  }
  .egg-row {
    display: flex;
    gap: 14px;
    justify-content: center;
  }
  .egg-btn {
    width: 68px; height: 68px;
    border-radius: 18px;
    border: 2.5px solid #eee;
    background: #fafafa;
    font-size: 24px;
    font-weight: 700;
    color: #888;
    cursor: pointer;
    transition: all 0.15s ease-out;
    -webkit-user-select: none;
    user-select: none;
  }
  .egg-btn:active { transform: scale(0.92); }
  .egg-btn.active {
    border-color: #FF6B00;
    background: #FF6B00;
    color: #fff;
    transform: scale(1.06);
    box-shadow: 0 6px 20px rgba(255, 107, 0, 0.35);
  }

  /* Type selector */
  .type-grid { display: flex; flex-direction: column; gap: 12px; }
  .type-btn {
    padding: 18px 22px;
    border-radius: 16px;
    border: 2.5px solid #eee;
    background: #fafafa;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s ease-out;
    text-align: left;
    -webkit-user-select: none;
    user-select: none;
  }
  .type-btn:active { transform: scale(0.97); }
  .type-btn.active {
    border-color: #FF6B00;
    background: #FFF2E8;
    box-shadow: 0 4px 16px rgba(255, 107, 0, 0.12);
  }
  .type-btn .label { font-weight: 700; color: #222; font-size: 17px; }
  .type-btn .desc { font-size: 13px; color: #aaa; margin-top: 3px; display: block; }

  /* Result */
  .result-circle {
    width: 172px; height: 172px;
    border-radius: 50%;
    background: linear-gradient(145deg, #FF7A1A, #FF4500);
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 12px 40px rgba(255, 69, 0, 0.3);
    animation: resultPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes resultPop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .result-circle .amount {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .result-circle .unit { font-size: 14px; opacity: 0.85; font-weight: 500; }
  .result-info {
    font-size: 16px;
    color: #888;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .result-info strong { color: #333; }

  /* Buttons */
  .nav { display: flex; gap: 12px; margin-top: 28px; }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: 16px;
    border: none;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease-out;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn-back { background: #f2f2f2; color: #888; }
  .btn-next {
    background: linear-gradient(135deg, #FF6B00, #FF5200);
    color: #fff;
    box-shadow: 0 6px 20px rgba(255, 107, 0, 0.3);
  }
  .btn-next:active { box-shadow: 0 2px 8px rgba(255, 107, 0, 0.2); }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* Progress */
  .progress {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e8e0d0;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .dot.active { background: #FF6B00; width: 28px; border-radius: 4px; }
  .dot.done { background: #FF6B00; }

  /* Tip */
  .tip {
    margin-top: 20px;
    padding: 12px 16px;
    background: #FFF7F0;
    border-radius: 12px;
    font-size: 13px;
    color: #996633;
    line-height: 1.5;
    text-align: left;
    border: 1px solid #FFE8D4;
  }
  .tip::before {
    content: '📌';
    margin-right: 6px;
  }

  /* Safe area bottom padding for notched phones */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .card { padding-bottom: calc(32px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<div class="card">
  <button class="lang-btn" id="langBtn" onclick="toggleLangMenu()"></button>
  <div class="lang-menu" id="langMenu"></div>

  <div class="emoji-title">🥚</div>
  <h1 id="title"></h1>
  <div class="progress">
    <div class="dot" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
  </div>

  <!-- Step 1: Count -->
  <div id="step0" class="step">
    <div class="step-label" id="stepLabel1"></div>
    <div class="question" id="q1"></div>
    <div class="egg-rows" id="eggGrid">
      <div class="egg-row" id="eggRow1"></div>
      <div class="egg-row" id="eggRow2"></div>
    </div>
    <div class="tip" id="tip1"></div>
    <div class="nav">
      <button class="btn btn-next" id="nextBtn0" disabled onclick="goTo(1)"></button>
    </div>
  </div>

  <!-- Step 2: Type -->
  <div id="step1" class="step hidden">
    <div class="step-label" id="stepLabel2"></div>
    <div class="question" id="q2"></div>
    <div class="type-grid" id="typeGrid">
      <button class="type-btn" data-type="soft" onclick="selectType(this)">
        <span class="label" id="typeSoftLabel"></span>
        <span class="desc" id="typeSoftDesc"></span>
      </button>
      <button class="type-btn" data-type="medium" onclick="selectType(this)">
        <span class="label" id="typeMediumLabel"></span>
        <span class="desc" id="typeMediumDesc"></span>
      </button>
      <button class="type-btn" data-type="hard" onclick="selectType(this)">
        <span class="label" id="typeHardLabel"></span>
        <span class="desc" id="typeHardDesc"></span>
      </button>
    </div>
    <div class="nav">
      <button class="btn btn-back" id="backBtn1" onclick="goTo(0)"></button>
      <button class="btn btn-next" id="nextBtn1" disabled onclick="goTo(2)"></button>
    </div>
  </div>

  <!-- Step 3: Result -->
  <div id="step2" class="step hidden">
    <div class="step-label" id="stepLabel3"></div>
    <div class="question" id="q3"></div>
    <div class="result-circle">
      <div class="amount" id="resultMl">—</div>
      <div class="unit" id="resultUnit"></div>
    </div>
    <div class="result-info" id="resultInfo"></div>
    <div class="nav">
      <button class="btn btn-back" id="backBtn2" onclick="goTo(1)"></button>
      <button class="btn btn-next" id="resetBtn" onclick="reset()"></button>
    </div>
  </div>
</div>

<script>
const data = {
  soft:   [60, 60, 55, 55, 45, 45, 40],
  medium: [80, 75, 70, 65, 55, 50, 45],
  hard:   [110,110,100,90, 85, 80, 70]
};

const i18n = {
  ru: {
    title: 'Помощник яйцеварки',
    step: (n) => `Шаг ${n} из 3`,
    done: 'Готово!',
    q1: 'Сколько яиц варим?',
    q2: 'Как сварить?',
    q3: 'Налейте воды в яйцеварку:',
    next: 'Далее',
    back: 'Назад',
    restart: 'Сначала',
    unit: 'мл воды',
    soft: 'Всмятку', softDesc: 'Жидкий желток, ~3 мин',
    medium: 'Полутвёрдое', mediumDesc: 'Кремовый желток, ~6 мин',
    hard: 'Вкрутую', hardDesc: 'Твёрдый желток, ~10 мин',
    egg: (n) => n === 1 ? 'яйцо' : (n >= 2 && n <= 4 ? 'яйца' : 'яиц'),
    tip: 'Проколите каждое яйцо с острой стороны перед варкой — так скорлупа не треснет',
    cc: 'ru'
  },
  en: {
    title: 'Egg Cooker Helper',
    step: (n) => `Step ${n} of 3`,
    done: 'Done!',
    q1: 'How many eggs?',
    q2: 'How to cook?',
    q3: 'Pour water into the egg cooker:',
    next: 'Next',
    back: 'Back',
    restart: 'Start over',
    unit: 'ml water',
    soft: 'Soft-boiled', softDesc: 'Runny yolk, ~3 min',
    medium: 'Medium', mediumDesc: 'Creamy yolk, ~6 min',
    hard: 'Hard-boiled', hardDesc: 'Firm yolk, ~10 min',
    egg: (n) => n === 1 ? 'egg' : 'eggs',
    tip: 'Pierce each egg at the pointed end before cooking — prevents cracking',
    cc: 'gb'
  },
  de: {
    title: 'Eierkocher-Helfer',
    step: (n) => `Schritt ${n} von 3`,
    done: 'Fertig!',
    q1: 'Wie viele Eier?',
    q2: 'Wie kochen?',
    q3: 'Wasser in den Eierkocher gießen:',
    next: 'Weiter',
    back: 'Zurück',
    restart: 'Neu starten',
    unit: 'ml Wasser',
    soft: 'Weich', softDesc: 'Flüssiges Eigelb, ~3 Min',
    medium: 'Mittel', mediumDesc: 'Cremiges Eigelb, ~6 Min',
    hard: 'Hart', hardDesc: 'Festes Eigelb, ~10 Min',
    egg: (n) => n === 1 ? 'Ei' : 'Eier',
    tip: 'Jedes Ei vor dem Kochen am spitzen Ende anstechen — verhindert Risse',
    cc: 'de'
  },
  fr: {
    title: 'Assistant cuiseur à œufs',
    step: (n) => `Étape ${n} sur 3`,
    done: 'Terminé !',
    q1: 'Combien d\'œufs ?',
    q2: 'Quelle cuisson ?',
    q3: 'Versez l\'eau dans le cuiseur :',
    next: 'Suivant',
    back: 'Retour',
    restart: 'Recommencer',
    unit: 'ml d\'eau',
    soft: 'À la coque', softDesc: 'Jaune liquide, ~3 min',
    medium: 'Mollet', mediumDesc: 'Jaune crémeux, ~6 min',
    hard: 'Dur', hardDesc: 'Jaune ferme, ~10 min',
    egg: (n) => n === 1 ? 'œuf' : 'œufs',
    tip: 'Percez chaque œuf au bout pointu avant la cuisson — évite les fissures',
    cc: 'fr'
  },
  es: {
    title: 'Asistente cocedor de huevos',
    step: (n) => `Paso ${n} de 3`,
    done: '¡Listo!',
    q1: '¿Cuántos huevos?',
    q2: '¿Cómo cocinar?',
    q3: 'Vierta agua en el cocedor:',
    next: 'Siguiente',
    back: 'Atrás',
    restart: 'Reiniciar',
    unit: 'ml de agua',
    soft: 'Pasado por agua', softDesc: 'Yema líquida, ~3 min',
    medium: 'Medio', mediumDesc: 'Yema cremosa, ~6 min',
    hard: 'Duro', hardDesc: 'Yema firme, ~10 min',
    egg: (n) => n === 1 ? 'huevo' : 'huevos',
    tip: 'Perfore cada huevo en el extremo puntiagudo antes de cocinar — evita que se agriete',
    cc: 'es'
  },
  zh: {
    title: '煮蛋器助手',
    step: (n) => `第 ${n} 步，共 3 步`,
    done: '完成！',
    q1: '煮几个蛋？',
    q2: '怎么煮？',
    q3: '请向煮蛋器中加水：',
    next: '下一步',
    back: '返回',
    restart: '重新开始',
    unit: '毫升水',
    soft: '溏心蛋', softDesc: '流心蛋黄，约3分钟',
    medium: '半熟蛋', mediumDesc: '软嫩蛋黄，约6分钟',
    hard: '全熟蛋', hardDesc: '全熟蛋黄，约10分钟',
    egg: () => '个蛋',
    tip: '煮前在鸡蛋尖端扎个小孔——防止蛋壳破裂',
    cc: 'cn'
  },
  ja: {
    title: 'エッグクッカー アシスタント',
    step: (n) => `ステップ ${n} / 3`,
    done: '完了！',
    q1: '卵の数は？',
    q2: 'ゆで加減は？',
    q3: 'エッグクッカーに水を入れてください：',
    next: '次へ',
    back: '戻る',
    restart: '最初から',
    unit: 'ml の水',
    soft: '半熟', softDesc: 'とろとろ黄身、約3分',
    medium: '中間', mediumDesc: 'クリーミーな黄身、約6分',
    hard: '固ゆで', hardDesc: 'しっかり黄身、約10分',
    egg: () => '個',
    tip: 'ゆでる前に卵の尖った方に小さな穴を開けてください — ひび割れを防ぎます',
    cc: 'jp'
  }
};

const langs = Object.keys(i18n);
let currentLang = 'ru';
let count = 0, type = '';

function detectLang() {
  const nav = (navigator.language || '').slice(0, 2).toLowerCase();
  return langs.includes(nav) ? nav : 'en';
}

const langMenu = document.getElementById('langMenu');
langs.forEach(code => {
  const btn = document.createElement('button');
  btn.className = 'lang-option';
  btn.dataset.lang = code;
  btn.textContent = code.toUpperCase();
  btn.onclick = (e) => { e.stopPropagation(); setLang(code); toggleLangMenu(); };
  langMenu.appendChild(btn);
});

function toggleLangMenu() { langMenu.classList.toggle('open'); }
document.addEventListener('click', (e) => {
  if (!e.target.closest('#langBtn') && !e.target.closest('#langMenu'))
    langMenu.classList.remove('open');
});

function setLang(code) {
  currentLang = code;
  const t = i18n[code];
  document.getElementById('title').textContent = t.title;
  document.getElementById('stepLabel1').textContent = t.step(1);
  document.getElementById('q1').textContent = t.q1;
  document.getElementById('nextBtn0').textContent = t.next;
  document.getElementById('tip1').textContent = t.tip;
  document.getElementById('stepLabel2').textContent = t.step(2);
  document.getElementById('q2').textContent = t.q2;
  document.getElementById('backBtn1').textContent = t.back;
  document.getElementById('nextBtn1').textContent = t.next;
  document.getElementById('typeSoftLabel').textContent = t.soft;
  document.getElementById('typeSoftDesc').textContent = t.softDesc;
  document.getElementById('typeMediumLabel').textContent = t.medium;
  document.getElementById('typeMediumDesc').textContent = t.mediumDesc;
  document.getElementById('typeHardLabel').textContent = t.hard;
  document.getElementById('typeHardDesc').textContent = t.hardDesc;
  document.getElementById('stepLabel3').textContent = t.done;
  document.getElementById('q3').textContent = t.q3;
  document.getElementById('resultUnit').textContent = t.unit;
  document.getElementById('backBtn2').textContent = t.back;
  document.getElementById('resetBtn').textContent = t.restart;
  document.getElementById('langBtn').textContent = code.toUpperCase();
  langMenu.querySelectorAll('.lang-option').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === code);
  });
  if (count && type) showResult();
}

// Build egg buttons
const grid = document.getElementById('eggGrid');
const row1 = document.getElementById('eggRow1');
const row2 = document.getElementById('eggRow2');
for (let i = 1; i <= 7; i++) {
  const b = document.createElement('button');
  b.className = 'egg-btn';
  b.textContent = i;
  b.onclick = () => {
    count = i;
    grid.querySelectorAll('.egg-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('nextBtn0').disabled = false;
  };
  (i <= 4 ? row1 : row2).appendChild(b);
}

function selectType(btn) {
  type = btn.dataset.type;
  document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('nextBtn1').disabled = false;
}

function goTo(step) {
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('step' + i);
    const show = i === step;
    el.classList.toggle('hidden', !show);
    if (show) { el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''; }
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('active', i === step);
    dot.classList.toggle('done', i < step);
  }
  if (step === 2) showResult();
}

function animateNumber(el, target, duration) {
  const start = performance.now();
  const from = 0;
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
    el.textContent = Math.round(from + (target - from) * ease);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function showResult() {
  const t = i18n[currentLang];
  const ml = data[type][count - 1];
  animateNumber(document.getElementById('resultMl'), ml, 800);
  document.getElementById('resultInfo').innerHTML =
    `<strong>${count}</strong> ${t.egg(count)} — <strong>${t[type]}</strong>`;
}

function reset() {
  count = 0; type = '';
  grid.querySelectorAll('.egg-btn').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
  document.getElementById('nextBtn0').disabled = true;
  document.getElementById('nextBtn1').disabled = true;
  goTo(0);
}

setLang(detectLang());
goTo(0);
</script>
</body>
</html>
